name: Release SDK TypeScript

on:
  push:
    tags:
      - "sdk/ts/coin/v*"

permissions:
  contents: write

jobs:
  release-sdk-ts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: |
          set -euo pipefail
          cd sdk/ts/coin
          npm ci

      - name: Run tests
        run: |
          set -euo pipefail
          cd sdk/ts/coin
          npm test

      - name: Build
        run: |
          set -euo pipefail
          cd sdk/ts/coin
          npm run build

      - name: Publish to npm
        run: |
          set -euo pipefail
          cd sdk/ts/coin
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
