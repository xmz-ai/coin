name: Release Core

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run core tests
        run: |
          set -euo pipefail
          go test ./internal/api ./internal/service ./internal/domain ./cmd/server -count=1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
