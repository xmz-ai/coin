name: Release SDK Go

on:
  push:
    tags:
      - "sdk/go/coin/v*"

permissions:
  contents: write

jobs:
  release-sdk-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20"

      - name: Run SDK tests
        run: |
          set -euo pipefail
          cd sdk/go/coin
          go test ./... -count=1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
