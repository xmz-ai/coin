services:
  db:
    image: postgres:16-alpine
    container_name: coin-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coin}
      POSTGRES_DB: ${POSTGRES_DB:-coin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - coin_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coin} -d ${POSTGRES_DB:-coin}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: coin-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - coin_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: postgres:16-alpine
    container_name: coin-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-coin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coin}
      POSTGRES_DB: ${POSTGRES_DB:-coin}
    volumes:
      - ../../migrations:/migrations:ro
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      set -e;
      until pg_isready -h "$$DB_HOST" -p "$$DB_PORT" -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"; do sleep 1; done;
      for f in /migrations/*.up.sql; do
        echo "[migrate] applying $$f";
        psql "postgresql://$$POSTGRES_USER:$$POSTGRES_PASSWORD@$$DB_HOST:$$DB_PORT/$$POSTGRES_DB?sslmode=disable" -v ON_ERROR_STOP=1 -f "$$f";
      done
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    container_name: coin-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HTTP_ADDR: :8080
      POSTGRES_DSN: postgres://${POSTGRES_USER:-coin}:${POSTGRES_PASSWORD:-coin}@db:5432/${POSTGRES_DB:-coin}?sslmode=disable
      POSTGRES_MAX_CONNS: ${POSTGRES_MAX_CONNS:-10}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      LOCAL_KMS_KEY_V1: ${LOCAL_KMS_KEY_V1:?LOCAL_KMS_KEY_V1 is required}
      ADMIN_ENABLED: ${ADMIN_ENABLED:-true}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  admin-web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.admin
      args:
        NEXT_PUBLIC_ADMIN_API_BASE: ${NEXT_PUBLIC_ADMIN_API_BASE:-/admin/api/v1}
        NEXT_ADMIN_PROXY_TARGET: http://coin-api:8080
    container_name: coin-admin-web
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_ADMIN_API_BASE: ${NEXT_PUBLIC_ADMIN_API_BASE:-/admin/api/v1}
      NEXT_ADMIN_PROXY_TARGET: http://coin-api:8080
    ports:
      - "${ADMIN_WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

volumes:
  coin_pg_data:
  coin_redis_data:
